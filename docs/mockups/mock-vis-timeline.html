<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camp Planner — vis-timeline mock</title>

<!-- vis-timeline 7.7.3 from CDN (Apache-2.0 / MIT, free) -->
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script src="./data.js"></script>

<style>
  body { font: 13px/1.4 system-ui, sans-serif; margin: 0; background: #fafafa; color: #222; }
  header { position: relative; padding: 14px 18px; background: #fff; border-bottom: 1px solid #e3e3e3; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  .sub { color: #666; font-size: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
  .legend i { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }
  #tl { margin: 12px; }

  /* one row per day */
  .vis-time-axis .vis-text { font-size: 11px; color: #888; }
  .vis-labelset .vis-label { font-weight: 600; }
  .vis-label .day-dom { font-weight: 400; color: #888; font-size: 11px; }
  /* zebra row tint marks day boundaries even under boxes */
  .vis-foreground .vis-group:nth-child(even) { background: rgba(20,30,50,.05); }
  .vis-labelset   .vis-label:nth-child(even) { background: #eceff4; }
  .vis-foreground .vis-group,
  .vis-labelset   .vis-label { border-bottom: 1px solid #c4cad3; }
  /* hovered row + its left label (pure CSS): row via :hover; label paired by position via :has(),
     one rule per row index (≤20 days) since the label is in a separate panel subtree */
  .vis-foreground .vis-group:hover,
  #tl:has(.vis-foreground .vis-group:nth-child(1):hover) .vis-labelset .vis-label:nth-child(1),
  #tl:has(.vis-foreground .vis-group:nth-child(2):hover) .vis-labelset .vis-label:nth-child(2),
  #tl:has(.vis-foreground .vis-group:nth-child(3):hover) .vis-labelset .vis-label:nth-child(3),
  #tl:has(.vis-foreground .vis-group:nth-child(4):hover) .vis-labelset .vis-label:nth-child(4),
  #tl:has(.vis-foreground .vis-group:nth-child(5):hover) .vis-labelset .vis-label:nth-child(5),
  #tl:has(.vis-foreground .vis-group:nth-child(6):hover) .vis-labelset .vis-label:nth-child(6),
  #tl:has(.vis-foreground .vis-group:nth-child(7):hover) .vis-labelset .vis-label:nth-child(7),
  #tl:has(.vis-foreground .vis-group:nth-child(8):hover) .vis-labelset .vis-label:nth-child(8),
  #tl:has(.vis-foreground .vis-group:nth-child(9):hover) .vis-labelset .vis-label:nth-child(9),
  #tl:has(.vis-foreground .vis-group:nth-child(10):hover) .vis-labelset .vis-label:nth-child(10),
  #tl:has(.vis-foreground .vis-group:nth-child(11):hover) .vis-labelset .vis-label:nth-child(11),
  #tl:has(.vis-foreground .vis-group:nth-child(12):hover) .vis-labelset .vis-label:nth-child(12),
  #tl:has(.vis-foreground .vis-group:nth-child(13):hover) .vis-labelset .vis-label:nth-child(13),
  #tl:has(.vis-foreground .vis-group:nth-child(14):hover) .vis-labelset .vis-label:nth-child(14),
  #tl:has(.vis-foreground .vis-group:nth-child(15):hover) .vis-labelset .vis-label:nth-child(15),
  #tl:has(.vis-foreground .vis-group:nth-child(16):hover) .vis-labelset .vis-label:nth-child(16),
  #tl:has(.vis-foreground .vis-group:nth-child(17):hover) .vis-labelset .vis-label:nth-child(17),
  #tl:has(.vis-foreground .vis-group:nth-child(18):hover) .vis-labelset .vis-label:nth-child(18),
  #tl:has(.vis-foreground .vis-group:nth-child(19):hover) .vis-labelset .vis-label:nth-child(19),
  #tl:has(.vis-foreground .vis-group:nth-child(20):hover) .vis-labelset .vis-label:nth-child(20) {
    background: rgba(255,205,0,.15);
    box-shadow: inset 0 2px 0 #444, inset 0 -2px 0 #444;
  }

  /* event cards. Box gaps = 2px transparent border (NOT margin.item, which inflates collision math);
     background-clip:padding-box keeps the fill inside it; `border` not `none` (vis forces border-style:solid). */
  .vis-item { border: 2px solid transparent; background-clip: padding-box;
              border-radius: 5px; color: #fff; font-size: 11px;
              min-height: 36px; box-sizing: border-box; }   /* normal / stacked half-height */
  .vis-item.solo { min-height: 74px; }                      /* no overlap in the row → double height */
  .vis-item .vis-item-content { padding: 2px 6px; width: 100%; box-sizing: border-box; }
  .vis-item.solo .vis-item-content { height: 100%; display: flex; flex-direction: column;
              justify-content: center; }
  .ev-title { font-weight: 600; }
  .ev-meta { opacity: .9; font-size: 10px; }
  .ev-orgs { font-weight: 700; }

  /* category colours (.vis-item.cat-*) are generated from CATEGORIES at runtime — see the IIFE */

  /* selection: recolour the gap-border (matches box geometry; overrides vis's gold default) */
  .vis-item.vis-selected { border-color: rgba(0,0,0,.8); box-shadow: none; }

  /* a span continues onto another row: flatten the cut edge + dashed seam */
  .vis-item.cut-l { border-top-left-radius: 0; border-bottom-left-radius: 0;
                    border-left: 2px dashed rgba(255,255,255,.85); }
  .vis-item.cut-r { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  /* right seam via pseudo-element (a border-right gets clipped at the panel edge) */
  .vis-item.cut-r::after { content: ''; position: absolute; top: 0; bottom: 0; right: 2px; width: 0;
                           border-left: 2px dashed rgba(255,255,255,.85); pointer-events: none; }

  /* prep / cleanup slots: faded, independently placeable */
  .margin { opacity: .45; font-style: italic; }

  /* day/night gradient: full-row background behind everything (z-index:-1); toggle fades opacity */
  .vis-item.daynight { border: 0; border-radius: 0; min-height: 0; z-index: -1;
                       transition: opacity .35s ease; }
  #tl.dn-hidden .vis-item.daynight { opacity: 0; }
  /* hour grid lines between gradient (-1) and boxes (1): dissolve vis's transform'd .vis-content
     stacking context (a no-op with page scroll) so the grid panel at z-index:0 sits between them */
  .vis-panel.vis-center > .vis-content { transform: none !important; }
  .vis-panel.vis-background.vis-vertical { z-index: 0; }
  .vis-time-axis .vis-grid.vis-vertical { border-color: #9aa3b2; opacity: .25; }

  /* controls pinned top-right (no toolbar row → saves vertical space) */
  .controls { position: absolute; top: 12px; right: 14px; display: flex; align-items: center; gap: 8px; }
  .edit-toggle { font: 12px system-ui;
     padding: 5px 11px; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #333;
     cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); display: flex; align-items: center; }
  .edit-toggle:hover { background: #f3f3f3; }
  .edit-toggle.on { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .zoom-ctrl { display: flex; gap: 4px; }
  .zoom-ctrl button { width: 28px; height: 28px; font-size: 18px; line-height: 1; border: 1px solid #ccc;
     border-radius: 6px; background: #fff; color: #333; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .zoom-ctrl button:hover { background: #f3f3f3; }
  /* cursor: pointer = clickable (view), move = draggable (edit) */
  #tl .vis-item { cursor: pointer; }
  #tl.edit-on .vis-item { cursor: move; }

  /* details modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
     display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay[hidden] { display: none; }
  .modal-box { background: #fff; border-radius: 10px; padding: 20px 24px; min-width: 320px;
     max-width: 92vw; box-shadow: 0 12px 48px rgba(0,0,0,.3); position: relative; }
  .modal-box h2 { margin: 0 0 14px; font-size: 18px; padding-right: 24px; }
  .modal-close { position: absolute; top: 8px; right: 12px; border: none; background: none;
     font-size: 24px; line-height: 1; cursor: pointer; color: #999; }
  .modal-close:hover { color: #333; }
  .m-row { display: flex; gap: 12px; padding: 6px 0; font-size: 13px; border-top: 1px solid #f0f0f0; }
  .m-row:first-of-type { border-top: none; }
  .m-key { width: 92px; flex: 0 0 92px; color: #888; }
  .m-chip { display: inline-block; width: 11px; height: 11px; border-radius: 3px;
     margin-right: 6px; vertical-align: -1px; }
</style>
</head>
<body>
<header>
  <div class="controls">
    <button id="dayNightToggle" class="edit-toggle" title="Zapnout/vypnout pozadí den/noc">🌙&nbsp;Den/noc</button>
    <button id="editToggle" class="edit-toggle" title="Zapnout/vypnout úpravy">✎&nbsp;Úpravy</button>
    <div class="zoom-ctrl">
      <button id="zoomOut" title="Oddálit (Ctrl + kolečko)">−</button>
      <button id="zoomIn"  title="Přiblížit (Ctrl + kolečko)">+</button>
    </div>
  </div>
  <h1>Camp Planner — vis-timeline prototype</h1>
  <div class="sub">Row&nbsp;=&nbsp;day, time&nbsp;→&nbsp;horizontal. <b>Click a slot</b> for details. Toggle <b>✎&nbsp;Úpravy</b>
     (top-right) to drag/resize; in edit mode <b>double-click</b> a slot for details. Overlaps auto-stack into sub-lanes.</div>
  <div class="legend" id="legend"></div>
</header>

<div id="tl"></div>

<!-- slot details modal -->
<div id="modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <button class="modal-close" id="modalClose" aria-label="Zavřít">×</button>
    <h2 id="m-title"></h2>
    <div class="m-row"><span class="m-key">Kategorie</span><span id="m-cat"></span></div>
    <div class="m-row"><span class="m-key">Kdy</span><span id="m-when"></span></div>
    <div class="m-row"><span class="m-key">Orgové</span><span id="m-orgs"></span></div>
    <div class="m-row"><span class="m-key">Typ slotu</span><span id="m-role"></span></div>
  </div>
</div>

<script>
(function () {
  // SLOTS (main/prep/cleanup, each with own start/end) are the source of truth; SEGMENTS are
  // derived per-row for display and every edit maps back onto a slot.
  const slots = buildSlots();
  const slotById = {};
  slots.forEach((s) => (slotById[s.id] = s));
  const tlEl = document.getElementById('tl');

  // legend + per-category box colours — both generated from CATEGORIES so colour lives in ONE place
  document.getElementById('legend').innerHTML = Object.entries(CATEGORIES)
    .map(([k, c]) => `<span><i style="background:${c.color}"></i>${c.label}</span>`).join('');
  document.head.insertAdjacentHTML('beforeend', '<style>' + Object.entries(CATEGORIES)
    .map(([k, c]) => `.vis-item.cat-${k}{background-color:${c.color};color:${c.text}}`).join('') + '</style>');

  // CAMP_START parsed once (camp day 0) — reused for REF below and the day/night gradient.
  const [campY, campMo, campD] = CAMP_START.split('-').map(Number);

  // Shared reference day for all rows (the day is the GROUP, not the date). REF is an abstract
  // rendering canvas — derived from CAMP_START for one date origin + the camp's DST regime; never
  // use it for real-instant math (the sun math uses CAMP_START separately). Local midnight: vis
  // renders the axis in local time, so item timestamps must be local too.
  const REF = new Date(campY, campMo - 1, campD, 0, 0).getTime();
  const winStart = REF + WINDOW_START_MIN * 60000;
  const winEnd   = REF + WINDOW_END_MIN   * 60000;
  const mToDate = (minFromWindow) => new Date(winStart + minFromWindow * 60000);
  // inverse of mToDate for a row: vis Date + group → absolute camp minutes. vis passes Date objects,
  // so .getTime() is safe.
  const dateToAbs = (date, group) =>
    group * DAY_MIN + WINDOW_START_MIN + Math.round((date.getTime() - winStart) / 60000);

  // ---- day/night background gradient -------------------------------------------------------
  // Shade each row by sun altitude. camp-clock = UTC + tzOffsetHours (CEST=+2) + shiftHours
  // (+1 → camp 06:00 = 05:00 CEST). `show` = default toggle state.
  const DAYNIGHT = { lat: 50.8075392, lng: 14.6796128, tzOffsetHours: 2, shiftHours: 1, show: true };
  // Solar altitude (radians) for an instant — derived from SunCalc (MIT, © Vladimir Agafonkin).
  const sunAltitude = (() => {
    const rad = Math.PI / 180, dayMs = 86400000, J1970 = 2440588, J2000 = 2451545, e = rad * 23.4397;
    const toDays = (d) => d / dayMs - 0.5 + J1970 - J2000;
    return (date, lat, lng) => {
      const lw = rad * -lng, phi = rad * lat, d = toDays(date);
      const M = rad * (357.5291 + 0.98560028 * d);                                    // solar mean anomaly
      const L = M + rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M)) + rad * 102.9372 + Math.PI; // ecliptic longitude
      const dec = Math.asin(Math.sin(e) * Math.sin(L));                               // declination
      const ra = Math.atan2(Math.sin(L) * Math.cos(e), Math.cos(L));                  // right ascension
      const H = rad * (280.16 + 360.9856235 * d) - lw - ra;                           // hour angle
      return Math.asin(Math.sin(phi) * Math.sin(dec) + Math.cos(phi) * Math.cos(dec) * Math.cos(H));
    };
  })();
  // altitude → deep-navy overlay, opacity ramping 1 (night) → 0 (day) across the twilight band
  function dnColor(altRad) {
    const a = altRad * 180 / Math.PI;
    const t = Math.max(0, Math.min(1, (a + 12) / 15));               // 0 = night, 1 = day
    return `rgba(24,34,62,${(1 - t).toFixed(2)})`;                   // #18223e deep navy
  }
  // one full-width background item per row, its gradient sampled from the sun every 20 min
  function dayNightBackgrounds() {
    const offMs = (DAYNIGHT.tzOffsetHours + DAYNIGHT.shiftHours) * 3600000;  // camp-clock = UTC + off
    return DAYS.map((_, i) => {
      const midnightUTC = Date.UTC(campY, campMo - 1, campD + i);            // 00:00 camp-date, UTC
      const samples = [];
      for (let m = 0; m <= DAY_MIN; m += 20) {
        const campMs = (WINDOW_START_MIN + m) * 60000;                       // camp ms after midnight
        const instant = new Date(midnightUTC + campMs - offMs);             // → real UTC instant
        samples.push({ c: dnColor(sunAltitude(instant, DAYNIGHT.lat, DAYNIGHT.lng)), p: m / DAY_MIN * 100 });
      }
      // emit a stop only where the colour changes (flat day/night runs collapse to their endpoints):
      // ~73 → ~17 stops, same look, far cheaper to repaint
      const stops = samples
        .filter((s, k) => k === 0 || k === samples.length - 1 ||
                          s.c !== samples[k - 1].c || s.c !== samples[k + 1].c)
        .map((s) => `${s.c} ${s.p.toFixed(1)}%`);
      return {
        id: 'bg' + i, group: i, type: 'background', start: winStart, end: winEnd,
        className: 'daynight', style: `background: linear-gradient(to right, ${stops.join(',')})`,
      };
    });
  }
  const bgItems = dayNightBackgrounds();

  // groups = days (rows)
  const groups = new vis.DataSet(DAYS.map((d, i) => ({
    id: i,
    content: `${d.wd} <span class="day-dom">${d.date}</span>`,
  })));

  // program items derived from per-day SEGMENTS, rebuilt on every edit; segLookup maps item id →
  // segment + owning slot.
  const items = new vis.DataSet();
  items.add(bgItems);   // day/night gradients are static → add ONCE; render() never re-adds them
  let segLookup = {};
  let dayNightOn = DAYNIGHT.show;
  const ROLE = { main: 'hlavní program', prep: 'příprava', cleanup: 'úklid' };  // role → Czech label

  function render() {
    segLookup = {};
    const segs = buildSegments(slots);
    // overlap → half height so the pair stacks; non-overlapping boxes keep double ("solo") height
    const overlaps = new Set(), byDay = {};
    segs.forEach((s) => (byDay[s.day] || (byDay[s.day] = [])).push(s));
    Object.values(byDay).forEach((arr) => {
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (arr[i].fromM < arr[j].toM && arr[j].fromM < arr[i].toM) {
            overlaps.add(arr[i].segId); overlaps.add(arr[j].segId);
          }
    });
    // build all items, then add in ONE call (per-item adds each fire an event + redraw)
    const batch = segs.map((s) => {
      const orgs = s.role === 'main' && s.orgs && s.orgs !== 'all'
        ? ` · <span class="ev-orgs">${s.orgs}</span>` : '';
      const left  = s.contBack ? '«&nbsp;' : '';   // « » mark continuation onto another row
      const right = s.contFwd  ? '&nbsp;»' : '';
      const tStart = fmtClock(s.sAbs);             // the activity's true start–end, on every segment
      const tEnd   = fmtClock(s.eAbs);
      const heading = s.role === 'main' ? s.title : `${ROLE[s.role]}: ${s.title}`;
      const id = 's' + s.segId;
      segLookup[id] = { seg: s, act: slotById[s.id] };
      // data-id on the time span lets onMoving update it in the DOM directly (no DataSet churn)
      return {
        id, group: s.day,
        start: mToDate(s.fromM), end: mToDate(s.toM),
        content:
          `<div class="ev-title">${left}${heading}${right}</div>` +
          `<div class="ev-meta"><span class="ev-time" data-id="${id}">${tStart}–${tEnd}</span>${orgs}</div>`,
        className: 'cat-' + s.cat + (overlaps.has(s.segId) ? '' : ' solo') +
                   (s.role !== 'main' ? ' margin' : '') +
                   (s.contBack ? ' cut-l' : '') + (s.contFwd ? ' cut-r' : ''),
      };
    });
    // replace only the program items; leave the static gradients (id 'bg*') so vis doesn't repaint them
    items.remove(items.getIds({ filter: (it) => !String(it.id).startsWith('bg') }));
    items.add(batch);
  }
  render();

  const timeline = new vis.Timeline(tlEl, items, groups, {
    stack: true,                 // overlaps stack into sub-lanes within a day row
    stackSubgroups: false,       // no subgroups → skip the extra stacking pass
    groupOrder: 'id',            // rows in day order (group id 0..N), not insertion-dependent
    orientation: { axis: 'both' }, // time axis at top AND bottom
    min: winStart, max: winEnd,  // clamp to the camp-day window
    start: winStart, end: winEnd,
    editable: false,             // start read-only; the edit toggle turns drag/resize on
    itemsAlwaysDraggable: { item: false, range: false },
    xss: { disabled: true },     // vis strips our class/data-* attrs otherwise; our content is trusted
    // margin 0: gaps come from the border, so a stacked gap matches a side-by-side one. axis:0 drops trailing space
    margin: { item: { horizontal: 0, vertical: 0 }, axis: 0 },
    zoomMin: 1000 * 60 * 60 * 2, // 2h
    showCurrentTime: false,      // meaningless on this abstract time-of-day axis
    showMajorLabels: false,      // all days share one ref date → the date label is noise
    format: { minorLabels: { hour: 'HH:mm' } },
    zoomKey: 'ctrlKey',          // wheel scrolls; zoom only with Ctrl+wheel (or the buttons)
    snap: (date) => {            // snap drags to the SLOT_MIN grid (15 min)
      const ms = SLOT_MIN * 60 * 1000;
      return new Date(Math.round(date / ms) * ms);
    },
    // live in-box time during drag: write the .ev-time DOM text directly (mutating item.content kills
    // the drag). Heights are not morphed mid-drag — reapplied on release via render().
    onMoving: (item, callback) => {
      callback(item);
      if (timeline.getSelection().indexOf(item.id) === -1) timeline.setSelection([item.id]);
      if (!segLookup[item.id]) return;
      const el = document.querySelector('.ev-time[data-id="' + item.id + '"]');
      if (!el) return;
      el.textContent = fmtClock(dateToAbs(item.start, item.group)) + '–' + fmtClock(dateToAbs(item.end, item.group));
    },
    // map the drag/resize onto the owning slot (both halves move together), cancel vis's mutation,
    // re-render. Dragging past the day end spills onto the next day.
    onMove: (item, callback) => {
      const e = segLookup[item.id];
      if (!e) { callback(null); return; }
      applySegmentEdit(e.act, e.seg, dateToAbs(item.start, item.group), dateToAbs(item.end, item.group), SLOT_MIN);
      callback(null);
      render();
    },
  });

  // ---- edit-mode toggle: gate drag/resize on a button (view mode by default) -------------
  let editEnabled = false;
  const editBtn = document.getElementById('editToggle');
  function syncEditUI() {
    editBtn.classList.toggle('on', editEnabled);
    editBtn.innerHTML = editEnabled ? '✓&nbsp;Úpravy zapnuty' : '✎&nbsp;Úpravy';
    tlEl.classList.toggle('edit-on', editEnabled);
  }
  function applyEditMode() {
    syncEditUI();
    // editable:false isn't enough — itemsAlwaysDraggable keeps items draggable, so disable it too
    timeline.setOptions({
      editable: editEnabled ? { updateTime: true, updateGroup: true, overrideItems: false } : false,
      itemsAlwaysDraggable: editEnabled ? { item: true, range: true } : { item: false, range: false },
    });
    render();   // re-add items so each picks up the new editability
  }
  editBtn.addEventListener('click', () => { editEnabled = !editEnabled; applyEditMode(); });
  syncEditUI();

  // ---- day/night toggle: flip a CSS class on #tl that fades the gradient's opacity -------
  const dnBtn = document.getElementById('dayNightToggle');
  function syncDayNightUI() {
    dnBtn.classList.toggle('on', dayNightOn);
    tlEl.classList.toggle('dn-hidden', !dayNightOn);
  }
  dnBtn.addEventListener('click', () => { dayNightOn = !dayNightOn; syncDayNightUI(); });
  syncDayNightUI();

  // zoom buttons (wheel-zoom needs Ctrl via zoomKey; these are the no-keyboard alternative)
  document.getElementById('zoomIn').addEventListener('click', () => timeline.zoomIn(0.5));
  document.getElementById('zoomOut').addEventListener('click', () => timeline.zoomOut(0.5));

  // (row + label hover highlight is pure CSS — see the :hover/:has() rule)

  // ---- details modal: single-click (view) / double-click (edit) opens it -----------------
  const modal = document.getElementById('modal');
  // absolute minutes → "Wd D. M. HH:MM"
  function fmtDateTime(abs) {
    const dayIdx = Math.floor(abs / DAY_MIN);
    const d = DAYS[dayIdx];
    return (d ? `${d.wd} ${d.date}` : `den ${dayIdx}`) + ' ' + fmtClock(abs);
  }
  function openModal(id) {
    const e = segLookup[id];
    if (!e) return;
    const a = e.act, c = CATEGORIES[a.cat] || {};
    document.getElementById('m-title').textContent = a.title;
    document.getElementById('m-cat').innerHTML =
      `<span class="m-chip" style="background:${c.color || '#ccc'}"></span>${c.label || a.cat}`;
    document.getElementById('m-when').textContent = `${fmtDateTime(a.sAbs)} → ${fmtDateTime(a.eAbs)}`;
    document.getElementById('m-orgs').textContent =
      a.orgs === 'all' ? 'všichni' : (a.orgs || '—');
    document.getElementById('m-role').textContent = ROLE[a.role] || a.role;
    modal.hidden = false;
  }
  const closeModal = () => { modal.hidden = true; };
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  timeline.on('click',       (p) => { if (!editEnabled && p.item != null) openModal(p.item); });
  timeline.on('doubleClick', (p) => { if ( editEnabled && p.item != null) openModal(p.item); });
})();
</script>
</body>
</html>
