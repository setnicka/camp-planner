<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camp Planner — vis-timeline mock</title>

<!-- vis-timeline 7.7.3 from CDN (Apache-2.0 / MIT, free) -->
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script src="./data.js"></script>

<style>
  body { font: 13px/1.4 system-ui, sans-serif; margin: 0; background: #fafafa; color: #222; }
  header { position: relative; padding: 14px 18px; background: #fff; border-bottom: 1px solid #e3e3e3; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  .sub { color: #666; font-size: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
  .legend i { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }
  #tl { margin: 12px; }

  /* one row per day */
  .vis-time-axis .vis-text { font-size: 11px; color: #888; }
  .vis-labelset .vis-label { font-weight: 600; }
  .vis-label .day-dom { font-weight: 400; color: #888; font-size: 11px; }
  /* clear day separation: a thin line ALONE "sticks" to the bottom of the boxes and is easy to
     miss, so add an alternating row tint (zebra) that reads even where boxes cover the row edge.
     The tint is translucent so the vertical hour grid still shows through. */
  .vis-foreground .vis-group:nth-child(even) { background: rgba(20,30,50,.05); }
  .vis-labelset   .vis-label:nth-child(even) { background: #eceff4; }
  .vis-foreground .vis-group,
  .vis-labelset   .vis-label { border-bottom: 1px solid #c4cad3; }
  /* highlight the day row (and its left label) under the cursor: subtle yellow wash + vibrant
     top/bottom edge lines (inset box-shadow → no layout shift; shows through the boxes'
     transparent top/bottom borders so the lines read across the whole row). */
  .vis-foreground .vis-group.day-hover,
  .vis-labelset   .vis-label.day-hover {
    background: rgba(255,205,0,.15);
    box-shadow: inset 0 2px 0 #444, inset 0 -2px 0 #444;
  }

  /* event cards.
     Gaps between boxes are done with a TRANSPARENT BORDER, not vis's `margin.item` — that
     margin feeds vis's stacking/collision math, so a non-zero value makes time-adjacent boxes
     look overlapping and forces spurious extra lanes. A border is purely visual: with
     `box-sizing: border-box` (vis sets this on `.vis-range`) the box still fits its allotted
     slot, so stacking is unaffected. `background-clip: padding-box` stops the fill from
     bleeding under the transparent border, leaving a real gap.
     We must set an explicit colour (transparent) because vis's `.vis-item.vis-range` rule
     re-forces `border-style: solid`; left at the default `currentColor` it would paint a
     dark-gray border on the light lecture boxes. */
  .vis-item { border: 2px solid transparent; border-bottom-width: 3px; background-clip: padding-box;
              border-radius: 5px; color: #fff; font-size: 11px;
              min-height: 36px; box-sizing: border-box; }   /* normal / stacked height; +1px gap below */
  /* a day with no overlaps: boxes are double height (vis grows the row to match) */
  .vis-item.solo { min-height: 74px; }
  .vis-item .vis-item-content { padding: 2px 6px; width: 100%; box-sizing: border-box; }
  /* centre the content vertically in the taller solo boxes */
  .vis-item.solo .vis-item-content { height: 100%; display: flex; flex-direction: column;
              justify-content: center; }
  .ev-title { font-weight: 600; }
  .ev-meta { opacity: .9; font-size: 10px; }
  .ev-orgs { font-weight: 700; }

  /* category colors — `.vis-item.cat-*` so they keep winning when an item is selected
     (vis's .vis-item.vis-selected would otherwise force a yellow background) */
  /* use `background-color` (longhand), NOT the `background` shorthand: the shorthand resets
     `background-clip` to `border-box`, which would undo the padding-box clip above and make the
     fill bleed under the transparent gap-border (boxes would touch again). */
  .vis-item.cat-exercise { background-color:#e67c73; }
  .vis-item.cat-meal     { background-color:#4285f4; }
  .vis-item.cat-lecture  { background-color:#f6bf26; color:#3c3c3c; }
  .vis-item.cat-game     { background-color:#0b8043; }
  .vis-item.cat-biggame  { background-color:#7986cb; }
  .vis-item.cat-trip     { background-color:#33b679; }
  .vis-item.cat-org      { background-color:#f4511e; }

  /* selected: keep the category colour, mark it with an outline (no layout shift,
     readable on any background — unlike vis's default yellow fill) */
  .vis-item.vis-selected { outline: 2px solid rgba(0,0,0,.75); outline-offset: -2px; box-shadow: none; }

  /* a span continues onto another row: flatten the cut edge + dashed seam */
  .vis-item.cut-l { border-top-left-radius: 0; border-bottom-left-radius: 0;
                    border-left: 2px dashed rgba(255,255,255,.85); }
  .vis-item.cut-r { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  /* the right seam sits exactly AT the panel edge and a border-right gets clipped by overflow,
     so draw it as a pseudo element inset 2px from the right instead. */
  .vis-item.cut-r::after { content: ''; position: absolute; top: 0; bottom: 0; right: 2px; width: 0;
                           border-left: 2px dashed rgba(255,255,255,.85); pointer-events: none; }

  /* prep / cleanup slots: faded, independently placeable */
  .margin { opacity: .45; font-style: italic; }

  /* day/night background items: fill the whole row, drop the card chrome. vis gives items
     z-index:1; drop these to -1 so the gradient sits BEHIND the foreground group layer — letting
     vis's row-divider borders and the day-hover highlight show on top — while the program boxes
     (z-index:1) still paint above the gradient. */
  .vis-item.daynight { border: 0; border-radius: 0; min-height: 0; z-index: -1; opacity: .6; }

  /* controls pinned to the header's top-right corner (no separate toolbar row → saves vertical space) */
  .controls { position: absolute; top: 12px; right: 14px; display: flex; align-items: center; gap: 8px; }
  .edit-toggle { font: 12px system-ui;
     padding: 5px 11px; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #333;
     cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); display: flex; align-items: center; }
  .edit-toggle:hover { background: #f3f3f3; }
  .edit-toggle.on { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .zoom-ctrl { display: flex; gap: 4px; }
  .zoom-ctrl button { width: 28px; height: 28px; font-size: 18px; line-height: 1; border: 1px solid #ccc;
     border-radius: 6px; background: #fff; color: #333; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .zoom-ctrl button:hover { background: #f3f3f3; }
  /* cursor hints: pointer = clickable (view), move = draggable (edit) */
  #tl .vis-item { cursor: pointer; }
  #tl.edit-on .vis-item { cursor: move; }

  /* details modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
     display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay[hidden] { display: none; }
  .modal-box { background: #fff; border-radius: 10px; padding: 20px 24px; min-width: 320px;
     max-width: 92vw; box-shadow: 0 12px 48px rgba(0,0,0,.3); position: relative; }
  .modal-box h2 { margin: 0 0 14px; font-size: 18px; padding-right: 24px; }
  .modal-close { position: absolute; top: 8px; right: 12px; border: none; background: none;
     font-size: 24px; line-height: 1; cursor: pointer; color: #999; }
  .modal-close:hover { color: #333; }
  .m-row { display: flex; gap: 12px; padding: 6px 0; font-size: 13px; border-top: 1px solid #f0f0f0; }
  .m-row:first-of-type { border-top: none; }
  .m-key { width: 92px; flex: 0 0 92px; color: #888; }
  .m-chip { display: inline-block; width: 11px; height: 11px; border-radius: 3px;
     margin-right: 6px; vertical-align: -1px; }
</style>
</head>
<body>
<header>
  <div class="controls">
    <button id="editToggle" class="edit-toggle" title="Zapnout/vypnout úpravy">✎&nbsp;Úpravy</button>
    <div class="zoom-ctrl">
      <button id="zoomOut" title="Oddálit (Ctrl + kolečko)">−</button>
      <button id="zoomIn"  title="Přiblížit (Ctrl + kolečko)">+</button>
    </div>
  </div>
  <h1>Camp Planner — vis-timeline prototype</h1>
  <div class="sub">Row&nbsp;=&nbsp;day, time&nbsp;→&nbsp;horizontal. <b>Click a slot</b> for details. Toggle <b>✎&nbsp;Úpravy</b>
     (top-right) to drag/resize; in edit mode <b>double-click</b> a slot for details. Overlaps auto-stack into sub-lanes.</div>
  <div class="legend" id="legend"></div>
</header>

<div id="tl"></div>

<!-- slot details modal -->
<div id="modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <button class="modal-close" id="modalClose" aria-label="Zavřít">×</button>
    <h2 id="m-title"></h2>
    <div class="m-row"><span class="m-key">Kategorie</span><span id="m-cat"></span></div>
    <div class="m-row"><span class="m-key">Kdy</span><span id="m-when"></span></div>
    <div class="m-row"><span class="m-key">Orgové</span><span id="m-orgs"></span></div>
    <div class="m-row"><span class="m-key">Typ slotu</span><span id="m-role"></span></div>
  </div>
</div>

<script>
(function () {
  // SLOTS (main / prep / cleanup — each with its own absolute start/end) are the
  // single source of truth; segments are derived for display and every edit maps
  // back onto a slot. Prep/cleanup are independent slots, editable on their own.
  const slots = buildSlots();
  const slotById = {};
  slots.forEach((s) => (slotById[s.id] = s));

  // legend
  document.getElementById('legend').innerHTML = Object.entries(CATEGORIES)
    .map(([k, c]) => `<span><i style="background:${c.color}"></i>${c.label}</span>`).join('');

  // All days share ONE reference date so the time-of-day aligns across rows.
  // The actual day is encoded by the GROUP, not the date.
  // Use LOCAL midnight (not Date.UTC): vis-timeline renders the axis in local time, so the
  // item timestamps must be local too, or the boxes sit 1 h off from the axis labels.
  const REF = new Date(2026, 0, 1, 0, 0).getTime(); // local midnight ref
  const winStart = REF + WINDOW_START_MIN * 60000;
  const winEnd   = REF + WINDOW_END_MIN   * 60000;
  const mToDate = (minFromWindow) => new Date(winStart + minFromWindow * 60000);

  // ---- day/night background gradient -------------------------------------------------------
  // Shade each day row by the sun's altitude at the camp location, so night/dawn/day/dusk read
  // at a glance. Config: location + the program's clock offset. The camp clock runs ahead of the
  // location's wall-clock by `tzOffsetHours` (CEST = UTC+2 in summer) + `shiftHours` (the program
  // shift; +1 here → camp 06:00 = 05:00 CEST). So camp-clock = UTC + tzOffsetHours + shiftHours.
  const DAYNIGHT = { lat: 50.8075392, lng: 14.6796128, tzOffsetHours: 2, shiftHours: 1 };
  // Compact solar-altitude (radians) for an instant — derived from SunCalc (MIT, © Vladimir Agafonkin).
  const sunAltitude = (() => {
    const rad = Math.PI / 180, dayMs = 86400000, J1970 = 2440588, J2000 = 2451545, e = rad * 23.4397;
    const toDays = (d) => d / dayMs - 0.5 + J1970 - J2000;
    return (date, lat, lng) => {
      const lw = rad * -lng, phi = rad * lat, d = toDays(date);
      const M = rad * (357.5291 + 0.98560028 * d);                                    // solar mean anomaly
      const L = M + rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M)) + rad * 102.9372 + Math.PI; // ecliptic longitude
      const dec = Math.asin(Math.sin(e) * Math.sin(L));                               // declination
      const ra = Math.atan2(Math.sin(L) * Math.cos(e), Math.cos(L));                  // right ascension
      const H = rad * (280.16 + 360.9856235 * d) - lw - ra;                           // hour angle
      return Math.asin(Math.sin(phi) * Math.sin(dec) + Math.cos(phi) * Math.cos(dec) * Math.cos(H));
    };
  })();
  // altitude (rad) → colour, smoothly ramping night→day across the twilight band (−12°…+3°)
  function dnColor(altRad) {
    const a = altRad * 180 / Math.PI;
    const t = Math.max(0, Math.min(1, (a + 12) / 15));
    const night = [26, 34, 58], day = [255, 250, 230];               // #1a223a → #fffae6
    const c = night.map((n, i) => Math.round(n + (day[i] - n) * t));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }
  // one full-width background item per day-row, its gradient sampled from the sun every 20 min
  function dayNightBackgrounds() {
    const [Y, Mo, D] = CAMP_START.split('-').map(Number);
    const offMs = (DAYNIGHT.tzOffsetHours + DAYNIGHT.shiftHours) * 3600000;  // camp-clock = UTC + off
    return DAYS.map((_, i) => {
      const midnightUTC = Date.UTC(Y, Mo - 1, D + i);                        // 00:00 camp-date, UTC
      const stops = [];
      for (let m = 0; m <= DAY_MIN; m += 20) {
        const campMs = (WINDOW_START_MIN + m) * 60000;                       // camp ms after midnight
        const instant = new Date(midnightUTC + campMs - offMs);             // → real UTC instant
        stops.push(`${dnColor(sunAltitude(instant, DAYNIGHT.lat, DAYNIGHT.lng))} ${(m / DAY_MIN * 100).toFixed(1)}%`);
      }
      return {
        id: 'bg' + i, group: i, type: 'background', start: winStart, end: winEnd,
        className: 'daynight', style: `background: linear-gradient(to right, ${stops.join(',')})`,
      };
    });
  }
  const bgItems = dayNightBackgrounds();

  // groups = days (rows)
  const groups = new vis.DataSet(DAYS.map((d, i) => ({
    id: i,
    content: `${d.wd} <span class="day-dom">${d.date}</span>`,
  })));

  // items — rebuilt from per-day SEGMENTS on every edit. A multi-day activity
  // (Noční bojovka, Po 22:00 → Út 07:30) appears as one segment on each row, and
  // `segLookup` maps each segment item back to its segment + owning activity.
  const items = new vis.DataSet();
  let segLookup = {};

  const roleLabel = { prep: 'příprava', cleanup: 'úklid' };

  function render() {
    segLookup = {};
    const segs = buildSegments(slots);
    // Per-ITEM overlap detection: a box keeps DOUBLE ("solo") height unless it shares time
    // with another box in the same row, in which case it drops to normal/half height so the
    // overlapping pair can stack. Non-overlapping neighbours in the same row stay full height.
    // (vis sizes the row to its content, so the row is as tall as its tallest stack.)
    const overlaps = new Set(), byDay = {};
    segs.forEach((s) => (byDay[s.day] || (byDay[s.day] = [])).push(s));
    Object.values(byDay).forEach((arr) => {
      for (let i = 0; i < arr.length; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (arr[i].fromM < arr[j].toM && arr[j].fromM < arr[i].toM) {
            overlaps.add(arr[i].segId); overlaps.add(arr[j].segId);
          }
    });
    // Build ALL items first, then push them to the DataSet in ONE call. Adding items
    // one-by-one makes vis fire an event (and schedule a redraw) per item — batching
    // the add is the single biggest speed-up for the initial draw and every re-render.
    const batch = segs.map((s) => {
      const orgs = s.role === 'main' && s.orgs && s.orgs !== 'all'
        ? ` · <span class="ev-orgs">${s.orgs}</span>` : '';
      // show the true start/end where they fall; "…" + arrow where the event is cut
      const left  = s.contBack ? '«&nbsp;' : '';
      const right = s.contFwd  ? '&nbsp;»' : '';
      // show the activity's true start–end on every segment; the « » arrows mark continuation
      const tStart = fmtClock(s.sAbs);
      const tEnd   = fmtClock(s.eAbs);
      // prep/cleanup slots are faded and labelled with their role + activity title
      const heading = s.role === 'main' ? s.title : `${roleLabel[s.role]}: ${s.title}`;
      const id = 's' + s.segId;
      segLookup[id] = { seg: s, act: slotById[s.id] };   // every slot is independently editable
      // data-id on the time span lets onMoving update it in the DOM directly (no DataSet churn)
      return {
        id, group: s.day,
        start: mToDate(s.fromM), end: mToDate(s.toM),
        content:
          `<div class="ev-title">${left}${heading}${right}</div>` +
          `<div class="ev-meta"><span class="ev-time" data-id="${id}">${tStart}–${tEnd}</span>${orgs}</div>`,
        className: 'cat-' + s.cat + (overlaps.has(s.segId) ? '' : ' solo') +
                   (s.role !== 'main' ? ' margin' : '') +
                   (s.contBack ? ' cut-l' : '') + (s.contFwd ? ' cut-r' : ''),
      };
    });
    items.clear();
    items.add(bgItems.concat(batch));   // day/night backgrounds + program items, in one bulk insert
  }
  render();

  const timeline = new vis.Timeline(document.getElementById('tl'), items, groups, {
    stack: true,                 // <-- overlaps stack into sub-lanes within a day row
    stackSubgroups: false,       // we assign no subgroups, so skip the extra subgroup-stacking pass
    orientation: { axis: 'top' },
    min: winStart, max: winEnd,  // clamp to the camp-day window
    start: winStart, end: winEnd,
    // start in read-only VIEW mode (the edit-toggle button turns drag/resize on);
    // constructing it this way avoids a second full render at startup.
    editable: false,
    itemsAlwaysDraggable: { item: false, range: false },
    // vis sanitizes item-content HTML by default, which STRIPS our class/data-* attributes
    // (so .ev-title/.ev-meta/.ev-time styling and the data-id hook were being removed). Our
    // content is trusted (we build it), so disable the sanitizer.
    xss: { disabled: true },
    // BOTH gaps come purely from the 2px transparent CSS border (see .vis-item): vertical margin
    // is 0 so a stacked gap is the same ~4px as a side-by-side gap (a non-zero margin would ADD to
    // the border, making vertical gaps visibly bigger). Two 36px halves then equal one 72px full
    // box exactly. Day separation comes from the zebra row tint, not from vertical spacing.
    margin: { item: { horizontal: 0, vertical: 0 }, axis: 0 },
    zoomMin: 1000 * 60 * 60,     // 1h
    // all days share one reference date, so the top-tier date label ("Thu 1 January")
    // is meaningless noise — hide it and keep only the time-of-day ticks.
    showMajorLabels: false,
    format: { minorLabels: { hour: 'HH:mm' } },
    zoomKey: 'ctrlKey',          // wheel alone scrolls; zoom only with Ctrl+wheel (+ buttons below)
    snap: (date) => {            // snap drags to 15-min grid
      const ms = 15 * 60 * 1000;
      return new Date(Math.round(date / ms) * ms);
    },
    // live in-box time during drag/resize: update the DOM text DIRECTLY (never mutate
    // item.content — that redraws the item and kills the in-progress drag). The data-id on
    // the .ev-time span lets us find the dragged element without touching vis's DataSet.
    onMoving: (item, callback) => {
      callback(item);                            // allow the move; don't mutate the item
      // auto-select the dragged item (selection only toggles a class — safe mid-drag)
      if (timeline.getSelection().indexOf(item.id) === -1) timeline.setSelection([item.id]);
      if (!segLookup[item.id]) return;
      const el = document.querySelector('.ev-time[data-id="' + item.id + '"]');
      if (!el) return;
      // item.start/end may be a Date OR a number/string here → normalise via new Date()
      const winLo = item.group * DAY_MIN + WINDOW_START_MIN;
      const ns = winLo + Math.round((new Date(item.start).getTime() - winStart) / 60000);
      const ne = winLo + Math.round((new Date(item.end).getTime()   - winStart) / 60000);
      el.textContent = fmtClock(ns) + '–' + fmtClock(ne);
      // NOTE: we deliberately do NOT morph box heights mid-drag. vis re-stacks the row during a
      // drag using each item's CACHED measured height, and a CSS height change isn't re-measured
      // until a full redraw (which would kill the drag). Toggling heights live therefore desynced
      // vis's stacking from the visible sizes — leaving half-height gaps and bottom overflow. So
      // the solo/half heights + re-stacking are applied on RELEASE (onMove → render()) instead.
    },
    // Intercept every drag/resize: map it onto the owning ACTIVITY (so both halves
    // of a span move together), cancel vis's own mutation, and re-render. Dragging
    // a segment past 03:00 / onto another row makes the activity spill to the next day.
    onMove: (item, callback) => {
      const e = segLookup[item.id];
      if (!e) { callback(null); return; }       // safety: only real slots are editable
      const winLo = item.group * DAY_MIN + WINDOW_START_MIN;
      const newStartAbs = winLo + Math.round((item.start.getTime() - winStart) / 60000);
      const newEndAbs   = winLo + Math.round((item.end.getTime()   - winStart) / 60000);
      applySegmentEdit(e.act, e.seg, newStartAbs, newEndAbs);
      callback(null);                            // activity model is the source of truth
      render();                                  // re-slice → both halves stay linked
      // a real app would POST e.act (id, sAbs, eAbs) to Flask here
    },
  });

  // ---- edit-mode toggle: gate drag/resize on a button (view mode by default) -------------
  let editEnabled = false;
  const editBtn = document.getElementById('editToggle');
  function syncEditUI() {
    editBtn.classList.toggle('on', editEnabled);
    editBtn.innerHTML = editEnabled ? '✓&nbsp;Úpravy zapnuty' : '✎&nbsp;Úpravy';
    document.getElementById('tl').classList.toggle('edit-on', editEnabled);
  }
  function applyEditMode() {
    syncEditUI();
    // editable:false alone is NOT enough — itemsAlwaysDraggable keeps items draggable even then,
    // so it must be turned off too for a true read-only view mode.
    timeline.setOptions({
      editable: editEnabled ? { updateTime: true, updateGroup: true, overrideItems: false } : false,
      itemsAlwaysDraggable: editEnabled ? { item: true, range: true } : { item: false, range: false },
    });
    render();   // re-add items so each picks up the new editability (vis won't refresh it in place)
  }
  editBtn.addEventListener('click', () => { editEnabled = !editEnabled; applyEditMode(); });
  syncEditUI();   // init: UI only — timeline is already constructed in view mode, items already rendered

  // zoom buttons (wheel-zoom needs Ctrl via zoomKey; these are the no-keyboard alternative)
  document.getElementById('zoomIn').addEventListener('click', () => timeline.zoomIn(0.5));
  document.getElementById('zoomOut').addEventListener('click', () => timeline.zoomOut(0.5));


  // highlight the day row under the cursor (the row AND its left label). Group ids are 0..N in
  // DAYS order, which matches the DOM order of the labels/rows, so we index by group id.
  const tlEl = document.getElementById('tl');
  let hoveredGroup = null;
  const clearHover = () => tlEl.querySelectorAll('.day-hover').forEach((el) => el.classList.remove('day-hover'));
  tlEl.addEventListener('mousemove', (e) => {
    const g = timeline.getEventProperties(e).group;
    if (g === hoveredGroup) return;
    hoveredGroup = g;
    clearHover();
    if (g == null) return;
    const labels = tlEl.querySelectorAll('.vis-labelset .vis-label');
    const rows   = tlEl.querySelectorAll('.vis-foreground .vis-group');
    if (labels[g]) labels[g].classList.add('day-hover');
    if (rows[g])   rows[g].classList.add('day-hover');
  });
  tlEl.addEventListener('mouseleave', () => { clearHover(); hoveredGroup = null; });

  // ---- details modal: single-click (view) / double-click (edit) opens it -----------------
  const roleName = { main: 'hlavní program', prep: 'příprava', cleanup: 'úklid' };
  const modal = document.getElementById('modal');
  // sAbs/eAbs are absolute minutes; recover the calendar day + clock for a full datetime label
  function fmtDateTime(abs) {
    const dayIdx = Math.floor(abs / DAY_MIN);
    const d = DAYS[dayIdx];
    return (d ? `${d.wd} ${d.date}` : `den ${dayIdx}`) + ' ' + fmtClock(abs);
  }
  function openModal(id) {
    const e = segLookup[id];
    if (!e) return;
    const a = e.act, c = CATEGORIES[a.cat] || {};
    document.getElementById('m-title').textContent = a.title;
    document.getElementById('m-cat').innerHTML =
      `<span class="m-chip" style="background:${c.color || '#ccc'}"></span>${c.label || a.cat}`;
    document.getElementById('m-when').textContent = `${fmtDateTime(a.sAbs)} → ${fmtDateTime(a.eAbs)}`;
    document.getElementById('m-orgs').textContent =
      a.orgs === 'all' ? 'všichni' : (a.orgs || '—');
    document.getElementById('m-role').textContent = roleName[a.role] || a.role;
    modal.hidden = false;
  }
  const closeModal = () => { modal.hidden = true; };
  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  timeline.on('click',       (p) => { if (!editEnabled && p.item != null) openModal(p.item); });
  timeline.on('doubleClick', (p) => { if ( editEnabled && p.item != null) openModal(p.item); });
})();
</script>
</body>
</html>
